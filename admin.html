<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | OpenLouk-Portal</title>
    <style>
        body { background: #1a0000; color: #ff0000; font-family: monospace; padding: 50px; text-align: center; }
        .login-box { border: 2px solid #ff0000; padding: 30px; display: inline-block; width: 300px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; background: #000; border: 1px solid #ff0000; color: #ff0000; }
        button { background: #ff0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>[ LOGIN REQUIRED ]</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button type="submit">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // بيانات سهلة للاختبار
            if(u === "admin" && p === "admin123") {
                alert("ACCESS GRANTED: Flag{OpenLouk_Sec_2026_Key}");
            } else {
                alert("ACCESS DENIED");
            }
        };
    </script>
</body>
</html>
